name: Build PlayerCount

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: CMake Configure
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: CMake Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Assemble package
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory "pkg\SKSE\Plugins" | Out-Null
          Copy-Item "build\Release\PlayerCount.dll" "pkg\SKSE\Plugins\PlayerCount.dll"
          Copy-Item "Data\SKSE\Plugins\PlayerCount.ini" "pkg\SKSE\Plugins\PlayerCount.ini"
          Compress-Archive -Path "pkg\*" -DestinationPath "PlayerCount.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayerCount
          path: PlayerCount.zip
          retention-days: 30
